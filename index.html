<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertOS v2 | Professional Certificate Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .cert-font { font-family: 'Libre Baskerville', serif; }
        .title-font { font-family: 'Cinzel', serif; }
        .border-gold { border: 20px double #8b5e34; outline: 4px solid #8b5e34; outline-offset: -28px; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 min-h-screen" x-data="app()" x-cloak>

    <div class="flex flex-col lg:flex-row h-screen overflow-hidden">
        
        <aside class="w-full lg:w-96 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col shadow-2xl overflow-y-auto">
            <div class="mb-8">
                <h1 class="text-xl font-bold text-white tracking-tighter uppercase">CertOS <span class="text-amber-500 underline">Professional</span></h1>
                <p class="text-[10px] text-zinc-500 font-mono">100% SERVERLESS / DATABASE-LESS</p>
            </div>

            <div class="space-y-6 flex-1">
                <section>
                    <label class="text-xs font-bold text-zinc-500 uppercase block mb-2">Document Type</label>
                    <select x-model="type" @change="resetData()" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded text-sm text-white focus:ring-1 focus:ring-amber-500 outline-none">
                        <template x-for="(t, id) in templates" :key="id">
                            <option :value="id" x-text="t.name"></option>
                        </template>
                    </select>
                </section>

                <section class="space-y-4">
                    <label class="text-xs font-bold text-zinc-500 uppercase block">Identity Data</label>
                    <template x-for="field in templates[type].fields" :key="field">
                        <input type="text" x-model="formData[field]" :placeholder="field" 
                               class="w-full bg-transparent border-b border-zinc-700 py-2 text-sm focus:border-amber-500 outline-none">
                    </template>
                </section>

                <section>
                    <label class="text-xs font-bold text-zinc-500 uppercase block mb-2">Security Seal</label>
                    <input type="file" @change="handleLogo" class="text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-zinc-400 hover:file:bg-zinc-700">
                </section>
            </div>

            <button @click="download" class="mt-8 w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded transition-all shadow-lg active:scale-95">
                GENERATE VECTOR PDF
            </button>
        </aside>

        <main class="flex-1 bg-zinc-950 p-8 flex items-center justify-center relative">
            <div id="capture" class="w-[842px] h-[595px] bg-white text-zinc-900 border-gold p-12 flex flex-col justify-between shadow-2xl relative overflow-hidden">
                
                <div class="absolute inset-0 opacity-5 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>

                <div class="z-10 border border-zinc-200 h-full w-full p-10 flex flex-col items-center text-center">
                    <h2 class="title-font text-3xl mb-1 tracking-[0.2em] text-amber-900" x-text="templates[type].name.toUpperCase()"></h2>
                    <div class="w-16 h-1 bg-amber-800 mb-8"></div>

                    <p class="cert-font italic text-lg text-zinc-500 mb-6">This official record confirms that</p>
                    
                    <h3 class="title-font text-5xl text-zinc-800 mb-8 border-b border-zinc-100 pb-4 min-w-[300px]" 
                        x-text="formData[templates[type].fields[0]] || 'Full Name'"></h3>

                    <p class="cert-font text-lg leading-relaxed max-w-xl text-zinc-600 italic" x-text="templates[type].desc"></p>

                    <div class="mt-auto w-full flex justify-between items-end px-12">
                        <div class="text-center">
                            <div class="w-40 border-b border-zinc-900 mb-1"></div>
                            <span class="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Authorized Official</span>
                        </div>
                        
                        <div class="relative w-24 h-24 flex items-center justify-center">
                            <template x-if="logo">
                                <img :src="logo" class="w-full h-full object-contain opacity-80 grayscale contrast-125">
                            </template>
                            <template x-if="!logo">
                                <div class="border-2 border-zinc-200 rounded-full w-full h-full flex items-center justify-center opacity-20">SEAL</div>
                            </template>
                        </div>

                        <div class="text-center">
                            <div class="w-40 border-b border-zinc-900 mb-1" x-text="new Date().toLocaleDateString()"></div>
                            <span class="text-[9px] font-bold uppercase tracking-widest text-zinc-500">Date of Issue</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function app() {
            return {
                type: 'marriage',
                formData: {},
                logo: null,
                templates: {
                    marriage: { name: 'Certificate of Marriage', fields: ['Spouse A', 'Spouse B', 'Officiant', 'Witness'], desc: 'Have been united in holy matrimony according to the laws and statutes of the state, in the presence of legal witnesses on this day.' },
                    death: { name: 'Certificate of Death', fields: ['Deceased', 'Cause', 'Place of Passing'], desc: 'The individual named above is formally recorded as deceased following medical and legal certification by authorized personnel.' },
                    birth: { name: 'Certificate of Birth', fields: ['Child Name', 'Mother', 'Father', 'Hospital'], desc: 'Serves as primary evidence of birth for the aforementioned child, recorded in the archives of health and civil services.' },
                    completion: { name: 'Course Completion', fields: ['Name', 'Course Title', 'Grade'], desc: 'Has successfully fulfilled all educational requirements and rigorous assessments mandated for the completion of the program.' },
                    diploma: { name: 'University Diploma', fields: ['Graduate', 'Major', 'University'], desc: 'The Trustees and Faculty confer this degree with all the honors, rights, and privileges thereunto appertaining.' },
                    employee: { name: 'Employee Recognition', fields: ['Employee Name', 'Company', 'Month'], desc: 'Awarded in recognition of peerless service, dedication, and professional excellence within the organization.' },
                    appreciation: { name: 'Award of Appreciation', fields: ['Recipient', 'Project'], desc: 'For outstanding commitment and invaluable contributions toward the successful completion of global objectives.' },
                    participation: { name: 'Participation Award', fields: ['Participant', 'Event Title'], desc: 'For active engagement and contribution to the workshops and seminars held during the annual summit.' },
                    vaccine: { name: 'Immunization Record', fields: ['Patient', 'Vaccine Type', 'Batch No'], desc: 'This record verifies that the individual has received the specified medical prophylaxis as administered by health authorities.' }
                },
                handleLogo(e) {
                    const reader = new FileReader();
                    reader.onload = (f) => this.logo = f.target.result;
                    reader.readAsDataURL(e.target.files[0]);
                },
                resetData() { this.formData = {}; },
                async download() {
                    const el = document.getElementById('capture');
                    const canvas = await html2canvas(el, { scale: 3, useCORS: true });
                    const imgData = canvas.toDataURL('image/png');
                    const { PDFDocument } = PDFLib;
                    const pdfDoc = await PDFDocument.create();
                    const page = pdfDoc.addPage([842, 595]); // A4 Landscape
                    const pngImage = await pdfDoc.embedPng(imgData);
                    page.drawImage(pngImage, { x: 0, y: 0, width: 842, height: 595 });
                    const pdfBytes = await pdfDoc.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `${this.type}-official-document.pdf`;
                    link.click();
                }
            }
        }
    </script>
</body>
</html>
