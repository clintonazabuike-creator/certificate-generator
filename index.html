<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertOS | Professional Serverless Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Libre+Baskerville&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        .cert-canvas { font-family: 'Libre Baskerville', serif; transition: all 0.3s ease; }
        .title-font { font-family: 'Cinzel Decorative', cursive; }
        .grid-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 grid-bg min-h-screen" x-data="certApp()" x-cloak>

    <div class="flex flex-col lg:flex-row h-screen">
        
        <aside class="w-full lg:w-[400px] bg-slate-900/80 backdrop-blur-xl border-r border-slate-800 p-8 overflow-y-auto flex flex-col">
            <div class="mb-8">
                <h1 class="text-2xl font-black tracking-tighter text-white">CERT<span class="text-amber-500">OS</span>.v1</h1>
                <p class="text-xs text-slate-500 font-mono uppercase tracking-widest">High-Fidelity PDF Engine</p>
            </div>

            <div class="space-y-1 mb-8">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Document Protocol</label>
                <select x-model="activeType" @change="updateTemplate" class="w-full bg-slate-800 border border-slate-700 p-3 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    <template x-for="(t, id) in templates" :key="id">
                        <option :value="id" x-text="t.name"></option>
                    </template>
                </select>
            </div>

            <div class="flex-1 space-y-4">
                <label class="text-[10px] font-bold text-slate-500 uppercase">Input Schema</label>
                <template x-for="field in templates[activeType].fields" :key="field">
                    <div>
                        <input type="text" 
                               :placeholder="field" 
                               x-model="formData[field]"
                               class="w-full bg-transparent border-b border-slate-700 py-2 text-sm focus:border-amber-500 outline-none transition-colors">
                    </div>
                </template>
            </div>

            <div class="pt-8">
                <button @click="generatePDF" 
                        class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(217,119,6,0.3)] transition-all flex items-center justify-center gap-2">
                    <span x-show="!loading">Execute Build</span>
                    <span x-show="loading" class="animate-spin text-lg italic">...</span>
                </button>
                <p class="mt-4 text-[9px] text-slate-600 text-center italic uppercase">Generated using client-side binary injection via PDF-LIB</p>
            </div>
        </aside>

        <main class="flex-1 flex items-center justify-center p-12 overflow-hidden bg-black/20">
            <div id="preview-frame" class="relative bg-white text-slate-900 w-[842px] h-[595px] shadow-[0_40px_100px_rgba(0,0,0,0.5)] cert-canvas border-[16px] border-double border-amber-800 p-12 text-center flex flex-col justify-between overflow-hidden">
                
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] rotate-[-30deg] scale-[2]">
                    <h2 class="text-9xl font-black italic">ORIGINAL DOCUMENT</h2>
                </div>

                <div class="z-10 flex flex-col h-full border border-slate-100 p-8">
                    <header>
                        <h2 class="title-font text-4xl mb-2 tracking-widest text-amber-900" x-text="templates[activeType].name"></h2>
                        <div class="w-24 h-[2px] bg-amber-700 mx-auto mb-6"></div>
                        <p class="italic text-slate-500 text-lg">This formal instrument acknowledges that</p>
                    </header>

                    <section class="flex-1 flex flex-col justify-center py-6">
                        <h3 class="title-font text-6xl text-slate-800 mb-6 drop-shadow-sm" x-text="formData[templates[activeType].fields[0]] || 'Subject Name'"></h3>
                        <p class="max-w-xl mx-auto text-slate-600 leading-relaxed text-lg" x-text="generateDescription()"></p>
                    </section>

                    <footer class="flex justify-between items-end px-10">
                        <div class="text-center">
                            <div class="w-40 border-b border-slate-900 mb-2"></div>
                            <p class="text-[10px] uppercase tracking-tighter font-bold">Authorized Registrar</p>
                        </div>
                        <div class="pb-2">
                            <div class="w-20 h-20 border-4 border-amber-900/20 rounded-full flex items-center justify-center opacity-40 grayscale">
                                <div class="w-14 h-14 border border-amber-900/40 rounded-full flex items-center justify-center">
                                    <span class="text-[8px] font-bold uppercase rotate-12 italic">Seal</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <div class="w-40 border-b border-slate-900 mb-2" x-text="new Date().toLocaleDateString()"></div>
                            <p class="text-[10px] uppercase tracking-tighter font-bold">Date of Execution</p>
                        </div>
                    </footer>
                </div>
            </div>
        </main>
    </div>

    <script>
        function certApp() {
            return {
                loading: false,
                activeType: 'marriage',
                formData: {},
                templates: {
                    marriage: { name: 'Marriage Certificate', fields: ['Spouse A', 'Spouse B', 'Venue', 'Officiant', 'Witness'], desc: 'Were joined in holy matrimony according to the rites and ceremonies of the state.' },
                    death: { name: 'Death Certificate', fields: ['Deceased', 'Date of Passing', 'Cause', 'Place of Death'], desc: 'The individual named above has been formally declared deceased following medical verification.' },
                    birth: { name: 'Birth Certificate', fields: ['Child Name', 'Parents', 'Time', 'Hospital'], desc: 'This document serves as primary evidence of birth for the aforementioned child.' },
                    completion: { name: 'Course Completion', fields: ['Student Name', 'Curriculum', 'Institution', 'Instructor'], desc: 'Has successfully fulfilled the rigorous academic requirements for the curriculum specified.' },
                    diploma: { name: 'University Diploma', fields: ['Graduate', 'Degree', 'Major', 'Honors'], desc: 'The Board of Regents confers this degree with all rights, honors, and privileges appertaining.' },
                    employee: { name: 'Employee of the Month', fields: ['Employee Name', 'Organization', 'Month', 'Performance Score'], desc: 'For exceptional service, dedication, and peerless contribution to company objectives.' },
                    appreciation: { name: 'Certificate of Appreciation', fields: ['Recipient', 'Project', 'Organization', 'Contribution'], desc: 'This recognition is granted for selfless commitment and outstanding collaborative effort.' },
                    participation: { name: 'Event Participation', fields: ['Participant', 'Event Title', 'Duration', 'Location'], desc: 'Has actively engaged in all primary sessions and workshops for the duration of the event.' },
                    vaccine: { name: 'Vaccination Record', fields: ['Patient', 'Vaccine Type', 'Dose Count', 'Lot Number'], desc: 'Formal immunization record verifying the administration of biological prophylaxis.' }
                },
                generateDescription() {
                    return this.templates[this.activeType].desc;
                },
                updateTemplate() {
                    this.formData = {};
                },
                async generatePDF() {
                    this.loading = true;
                    try {
                        const { PDFDocument, rgb, StandardFonts } = PDFLib;
                        const pdfDoc = await PDFDocument.create();
                        const page = pdfDoc.addPage([842, 595]); // A4 Landscape
                        const font = await pdfDoc.embedFont(StandardFonts.TimesRomanBold);
                        const italicFont = await pdfDoc.embedFont(StandardFonts.TimesRomanItalic);

                        // Draw UI Elements to PDF
                        page.drawText(this.templates[this.activeType].name, { x: 50, y: 500, size: 40, font, color: rgb(0.2, 0.1, 0) });
                        page.drawText(this.formData[this.templates[this.activeType].fields[0]] || 'Subject Name', { x: 50, y: 400, size: 50, font, color: rgb(0.1, 0.1, 0.1) });
                        page.drawText(this.generateDescription(), { x: 50, y: 300, size: 14, font: italicFont, color: rgb(0.4, 0.4, 0.4) });

                        // Meta-Data
                        pdfDoc.setTitle(this.templates[this.activeType].name);
                        pdfDoc.setAuthor('CertOS Generator');

                        const pdfBytes = await pdfDoc.save();
                        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = `${this.activeType}-cert.pdf`;
                        link.click();
                    } catch (e) {
                        console.error("Binary generation failed", e);
                    }
                    this.loading = false;
                }
            }
        }
    </script>
</body>
</html>
