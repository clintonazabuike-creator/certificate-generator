<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Registry Engine | MI-Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Dancing+Script:wght@700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        .font-serif { font-family: 'Libre Baskerville', serif; }
        .font-header { font-family: 'Cinzel', serif; }
        .font-signature { font-family: 'Dancing Script', cursive; }
        .font-gov { font-family: 'Playfair Display', serif; }
        
        /* Marriage: Ornate & Elegant */
        .marriage-border { border: 15px double #5c4033; outline: 2px solid #5c4033; outline-offset: -20px; background-color: #fffaf0; }
        
        /* Death: Grid-based & Clinical */
        .death-border { border: 2px solid #000; background-color: #fdfdfd; }
        .death-grid div { border: 1px solid #000; padding: 4px 8px; }
        .death-label { font-size: 8px; font-weight: bold; text-transform: uppercase; color: #333; display: block; }
        
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-900 text-zinc-300 font-sans" x-data="app()" x-cloak>

    <div class="flex h-screen overflow-hidden">
        <aside class="w-96 bg-black p-8 overflow-y-auto border-r border-white/10 shadow-2xl">
            <h1 class="text-xl font-header text-amber-500 mb-6">State Registry v4</h1>
            
            <div class="mb-8">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-2 block">Document Type</label>
                <div class="flex gap-2">
                    <button @click="type = 'marriage'" :class="type === 'marriage' ? 'bg-amber-600 text-white' : 'bg-zinc-800'" class="flex-1 py-2 text-xs font-bold rounded">MARRIAGE</button>
                    <button @click="type = 'death'" :class="type === 'death' ? 'bg-zinc-600 text-white' : 'bg-zinc-800'" class="flex-1 py-2 text-xs font-bold rounded">DEATH</button>
                </div>
            </div>

            <div class="space-y-4">
                <template x-for="field in fields[type]" :key="field">
                    <div>
                        <label class="text-[9px] font-bold text-zinc-600 uppercase" x-text="field"></label>
                        <input type="text" x-model="formData[field]" class="w-full bg-zinc-900 border border-zinc-800 p-2 text-sm text-white focus:border-amber-500 outline-none rounded">
                    </div>
                </template>
            </div>

            <button @click="download" class="mt-10 w-full bg-white text-black font-black py-4 rounded-lg hover:bg-amber-500 transition-all flex items-center justify-center gap-2">
                <span x-show="!loading">GENERATE LEGAL PDF</span>
                <span x-show="loading" class="animate-spin text-lg">⚙️</span>
            </button>
        </aside>

        <main class="flex-1 bg-zinc-800 p-12 flex justify-center overflow-auto items-start">
            <div id="capture" class="shrink-0 shadow-[0_50px_100px_rgba(0,0,0,0.5)]">
                
                <template x-if="type === 'marriage'">
                    <div class="w-[850px] h-[1100px] marriage-border p-16 text-center flex flex-col justify-between text-stone-900">
                        <header>
                            <h2 class="font-header text-sm tracking-[0.4em] mb-4">State of Michigan</h2>
                            <h1 class="font-header text-5xl mb-2 text-stone-800">Marriage License</h1>
                            <p class="font-serif italic text-lg border-b border-stone-300 pb-4">This Certifies That</p>
                        </header>
                        
                        <div class="flex-1 flex flex-col justify-center gap-8">
                            <div>
                                <p class="text-4xl font-signature" x-text="formData['Full Name (Spouse A)'] || 'Name of Spouse A'"></p>
                                <div class="w-64 h-[1px] bg-stone-400 mx-auto mt-2"></div>
                                <span class="text-[10px] uppercase font-bold text-stone-500">Spouse A</span>
                            </div>
                            <span class="font-serif text-2xl italic text-stone-400">and</span>
                            <div>
                                <p class="text-4xl font-signature" x-text="formData['Full Name (Spouse B)'] || 'Name of Spouse B'"></p>
                                <div class="w-64 h-[1px] bg-stone-400 mx-auto mt-2"></div>
                                <span class="text-[10px] uppercase font-bold text-stone-500">Spouse B</span>
                            </div>
                            <p class="font-serif italic text-lg px-20">Were united in Holy Matrimony according to the laws of the State at the place and date specified below.</p>
                        </div>

                        <footer class="grid grid-cols-2 gap-12 text-left px-10">
                            <div class="space-y-4">
                                <div>
                                    <span class="text-[10px] font-bold block uppercase">Date of Ceremony</span>
                                    <p class="border-b border-stone-300 font-serif py-1" x-text="formData['Date of Marriage']"></p>
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold block uppercase">Location</span>
                                    <p class="border-b border-stone-300 font-serif py-1" x-text="formData['City/County']"></p>
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <span class="text-[10px] font-bold block uppercase">Officiant Signature</span>
                                    <p class="font-signature text-2xl text-blue-900 border-b border-stone-300" x-text="formData['Officiant Name']"></p>
                                </div>
                                <div>
                                    <span class="text-[10px] font-bold block uppercase">License Number</span>
                                    <p class="font-mono text-xs py-1" x-text="formData['License Number'] || 'MI-000000'"></p>
                                </div>
                            </div>
                        </footer>
                    </div>
                </template>

                <template x-if="type === 'death'">
                    <div class="w-[850px] h-[1100px] death-border p-8 bg-white text-black text-[10px] leading-tight">
                        <div class="text-center mb-4 uppercase border-b-2 border-black pb-2">
                            <h1 class="font-bold text-lg">State of Michigan - Department of Health</h1>
                            <h2 class="font-bold text-sm tracking-widest">Certificate of Death</h2>
                        </div>

                        <div class="death-grid grid grid-cols-12 border-t border-l border-black">
                            <div class="col-span-8"><span class="death-label">1. Full Name of Deceased</span><p class="text-xs font-bold uppercase" x-text="formData['Full Name']"></p></div>
                            <div class="col-span-2"><span class="death-label">2. Sex</span><p x-text="formData['Sex']"></p></div>
                            <div class="col-span-2"><span class="death-label">3. Date of Death</span><p class="font-bold" x-text="formData['Date of Death']"></p></div>
                            
                            <div class="col-span-4"><span class="death-label">4. Social Security Number</span><p x-text="formData['SSN']"></p></div>
                            <div class="col-span-4"><span class="death-label">5. Age</span><p x-text="formData['Age']"></p></div>
                            <div class="col-span-4"><span class="death-label">6. Place of Death (City/County)</span><p x-text="formData['Place of Death']"></p></div>
                            
                            <div class="col-span-12 h-10 bg-gray-100 flex items-center font-bold px-2 border-r border-b">MEDICAL CERTIFICATION OF CAUSE</div>
                            
                            <div class="col-span-9 h-16"><span class="death-label">7. Immediate Cause (A)</span><p class="text-sm font-serif" x-text="formData['Cause (A)']"></p></div>
                            <div class="col-span-3 h-16"><span class="death-label">Interval between onset</span><p x-text="formData['Interval']"></p></div>
                            
                            <div class="col-span-12 h-16"><span class="death-label">8. Other Significant Conditions</span><p x-text="formData['Other Conditions']"></p></div>
                            
                            <div class="col-span-6 h-16"><span class="death-label">9. Certifier Signature</span><p class="font-signature text-xl" x-text="formData['Certifier Name']"></p></div>
                            <div class="col-span-6 h-16"><span class="death-label">10. License Number of Certifier</span><p x-text="formData['Certifier License']"></p></div>
                        </div>

                        <div class="mt-8 border-2 border-black p-4 italic text-center text-xs">
                            This is a certified copy of the record on file with the State Registrar. Any alteration or erasure voids this certificate.
                        </div>
                    </div>
                </template>

            </div>
        </main>
    </div>

    <script>
        function app() {
            return {
                type: 'marriage',
                loading: false,
                formData: {},
                fields: {
                    marriage: ['Full Name (Spouse A)', 'Full Name (Spouse B)', 'Date of Marriage', 'City/County', 'Officiant Name', 'License Number'],
                    death: ['Full Name', 'Sex', 'Date of Death', 'Age', 'SSN', 'Place of Death', 'Cause (A)', 'Interval', 'Other Conditions', 'Certifier Name', 'Certifier License']
                },
                resetData() { this.formData = {}; },
                async download() {
                    this.loading = true;
                    const original = document.getElementById('capture');
                    
                    // Fixed Capture Logic
                    const canvas = await html2canvas(original, { 
                        scale: 3, 
                        useCORS: true,
                        width: 850,
                        height: 1100
                    });

                    const imgData = canvas.toDataURL('image/png', 1.0);
                    const { PDFDocument } = PDFLib;
                    const pdfDoc = await PDFDocument.create();
                    
                    // Standard Portrait A4
                    const page = pdfDoc.addPage([595.28, 841.89]); 
                    const pngImage = await pdfDoc.embedPng(imgData);
                    
                    page.drawImage(pngImage, { 
                        x: 0, y: 0, 
                        width: 595.28, height: 841.89 
                    });

                    const pdfBytes = await pdfDoc.save();
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(new Blob([pdfBytes], { type: 'application/pdf' }));
                    link.download = `${this.type}-state-record.pdf`;
                    link.click();
                    this.loading = false;
                }
            }
        }
    </script>
</body>
                                                                                                                                                     </html>
